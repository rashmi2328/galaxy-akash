    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: #280905;
            overflow-x: hidden;
            color: white;
            padding-top: 50px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        /* floating particles */

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: .6;
            animation: move 10s linear infinite;
        }

        @keyframes move {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-1000px)
            }
        }

        /* card */

        .card {
            width: 360px;
            max-width: 95vw;
            padding: 45px 30px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 0 60px #ffe06633;
        }

        @media (max-width: 600px) {
            body {
                padding-top: 50px;
                padding-bottom: 50px;
            }
            .card {
                width: 100%;
                max-width: 98vw;
                padding: 28px 8px;
                border-radius: 18px;
            }
            .profile-wrap {
                width: 90px;
                height: 90px;
            }
            .profile {
                width: 80px;
                height: 80px;
            }
            h2 {
                font-size: 18px;
            }
            .btn {
                padding: 14px 18px;
                font-size: 16px;
            }
            .text {
                font-size: 12px;
            }
        }

        /* profile */

        .profile-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-spinner {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            background: conic-gradient(#ddb000 0deg, #db30a2 120deg, #fff 240deg, #ffe0669c 360deg);
            filter: blur(1.5px);
            animation: spinBorder 2.2s linear infinite;
        }
        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #ffe066;
            object-fit: cover;
            position: relative;
            z-index: 2;
            /* Remove animatedShadow from profile */
        }
        @keyframes spinBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes animatedShadow {
            0% {
                box-shadow: 0 0 10px 2px #ff8ad899, 0 0 16px 4px #ffe06699;
            }
            50% {
                box-shadow: 0 0 16px 4px #ffe066cc, 0 0 20px 6px #ff8ad8cc;
            }
            100% {
                box-shadow: 0 0 10px 2px #ff8ad899, 0 0 16px 4px #ffe06699;
            }
        }

        /* heading */

        h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        /* text */

        .text {
            font-size: 14px;
            line-height: 1.6;
            opacity: .9;
            margin-bottom: 30px;
        }

        /* CTA button */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 40px;
            border-radius: 60px;
            background: linear-gradient(45deg, #ffe066, #ff8ad8);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            position: relative;
            animation: pulse 1.6s ease-in-out infinite;
            box-shadow: 0 0 10px 2px #ffe06688;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px 2px #ffe06688; }
            20% { transform: scale(1.08); box-shadow: 0 0 18px 6px #ffe066cc; }
            40% { transform: scale(1); }
            60% { transform: scale(1.05); box-shadow: 0 0 14px 4px #ff8ad8aa; }
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* circular timer */

        .timer {
            margin-top: 25px;
            font-size: 14px;
            opacity: .9;
        }

        /* disclaimer */

        .disclaimer {
            margin-top: 20px;

            opacity: .6;
            text-align: center;
        }

        .ads {

            font-size: 12px;

        }

        .ads a {
            color: #00f5ff;
            font-weight: bold;
            text-decoration: none;
        }
